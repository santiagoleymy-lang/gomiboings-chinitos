<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomiboings CHINITOS</title>

    <style>

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI',sans-serif;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            padding: 15px;
            background: linear-gradient(135deg,#ff2b2b,#7a0000);
        }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(circle at top, rgba(255,255,255,0.15), transparent);
                pointer-events: none;
            }

        html {
            background: linear-gradient(135deg,#d60000,#a80000);
        }


        /* BOINGS */

        .boing-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .boing {
            position: absolute;
            width: clamp(55px, 12vw, 85px);
            opacity: 0.8;
            animation: move 22s linear infinite;
            will-change: transform;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
        }

        @keyframes move {
            0% {
                transform: translate3d(0,0,0);
            }

            100% {
                transform: translate3d(120vw,0,0);
            }
        }

        /* TARJETA */

        .app {
            background: rgba(255,255,255,0.9);
            width: 100%;
            max-width: 380px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
            margin: auto;
            backdrop-filter: blur(8px);
        }

        /* 📱 CELULARES */
        @media (max-width: 480px) {
            .app {
                max-width: 100%;
                padding: 18px;
                border-radius: 18px;
            }
        }

        /* 📲 TABLETS */
        @media (min-width: 481px) and (max-width: 900px) {
            .app {
                max-width: 420px;
            }
        }

        /* 💻 COMPUTADORAS */
        @media (min-width: 901px) {
            .app {
                max-width: 420px;
            }
        }

        /* BOTONES */

        .top-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .circle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg,#ff2b2b,#a80000);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
        }

            .circle-btn:hover {
                transform: scale(1.1);
            }

            .circle-btn:active {
                transform: scale(0.9);
            }

        /* LOGO */

        .logo {
            display: block;
            margin: auto;
            width: 110px;
        }

        /* CAMPOS */

        label {
            margin-top: 10px;
            display: block;
            font-size: 13px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ccc;
            margin-top: 5px;
            font-size: 16px;
        }

        /* TEXTO */

        .total {
            margin-top: 10px;
            font-weight: bold;
            color: #c40000;
        }

        /* BOTON */

        .main {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #d60000;
            color: white;
            cursor: pointer;
        }

        /* MODALES */

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
        }

        .close {
            float: right;
            cursor: pointer;
        }

        /* SPLASH */

        .splash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0.5);
            background: #ff0000;
            color: white;
            padding: 20px;
            border-radius: 20px;
            opacity: 0;
            z-index: 999;
        }

            .splash.show {
                animation: splash 0.6s forwards;
            }

        @keyframes splash {
            0% {
                transform: translate(-50%,-50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%,-50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%,-50%) scale(1);
                opacity: 1;
            }
        }

        /* MODAL PRO */

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

            .modal.active {
                display: flex;
            }

        .modal-box {
            background: #fff;
            width: 90%;
            max-width: 350px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: aparecer 0.3s ease;
        }

        @keyframes aparecer {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* HEADER */

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .close-btn {
            background: #eee;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* BOTON BORRAR */

        .delete-btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #ff3b3b;
            color: white;
            cursor: pointer;
        }

        /* LISTA */

        .lista {
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }

        .cerrar-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg,#111,#333);
            color: white;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: 0.25s;
        }

            /* HOVER */

            .cerrar-btn:hover {
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            }

            /* CLICK */

            .cerrar-btn:active {
                transform: scale(0.95);
            }

        .cerrar-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg,#111,#333);
            color: white;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: 0.25s;
        }

            /* HOVER */

            .cerrar-btn:hover {
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            }

            /* CLICK */

            .cerrar-btn:active {
                transform: scale(0.95);
            }

        .loader {
            width: 40px;
            height: 40px;
            border: 5px solid #eee;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            animation: girar 1s linear infinite;
            margin: auto;
        }

        @keyframes girar {
            to {
                transform: rotate(360deg);
            }
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        * {
            -webkit-font-smoothing: antialiased;
            -webkit-transform: translateZ(0);
        }

        /* SUAVIDAD EN CELULAR */
        * {
            -webkit-font-smoothing: antialiased;
            -webkit-transform: translateZ(0);
        }

        /* BOTONES MÁS GRANDES EN CELULAR */
        @media (max-width: 480px) {
            .cerrar-btn {
                padding: 16px;
                font-size: 16px;
            }

            .circle-btn {
                width: 44px;
                height: 44px;
            }
        }

        /* MODALES RESPONSIVOS */
        .modal-box {
            width: 90%;
            max-width: 360px;
        }

        @media (max-width: 480px) {
            .modal-box {
                width: 95%;
                padding: 18px;
            }
        }

        /* IMÁGENES */
        img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 480px) {

            body {
                align-items: flex-start;
                padding-top: 20px;
            }

            .boing {
                opacity: 0.6;
                animation-duration: 28s;
            }
        }

        body {
            overflow-y: auto;
        }

        .producto-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .producto-nombre {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .producto-acciones {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-mini {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn-editar {
            background: #007bff;
        }

        .btn-eliminar {
            background: #ff3b3b;
        }

        @media (max-width: 480px) {
            .boing {
                animation-duration: 35s;
                opacity: 0.5;
            }
        }
    </style>
</head>

<body>

    <div class="boing-bg">
        <img src="boing1.png" class="boing" style="top:5%; left:-100px;">
        <img src="boing2.png" class="boing" style="top:15%; left:-300px;">
        <img src="boing1.png" class="boing" style="top:30%; left:-500px;">
        <img src="boing2.png" class="boing" style="top:45%; left:-700px;">
        <img src="boing1.png" class="boing" style="top:60%; left:-200px;">
        <img src="boing2.png" class="boing" style="top:75%; left:-400px;">
        <img src="boing1.png" class="boing" style="top:85%; left:-600px;">
    </div>

    <div class="app">


        <div class="top-buttons">
            <button class="circle-btn" onclick="abrirHistorial()">📊</button>
            <button class="circle-btn" onclick="abrirGanancia()">💵</button>
            <button class="circle-btn" onclick="abrirProducto()">➕</button>
            <button class="circle-btn" onclick="toggleEdicion()">✏️</button>

        </div>

        <img src="Logo.png" class="logo">

        <h3 style="text-align:center;color:#c40000;">Gomiboings CHINITOS</h3>

        <label>No. Venta</label>
        <input id="venta" disabled>

        <label>Fecha</label>
        <input id="fecha" disabled>

        <label>Gomiboing</label>
        <input type="number" id="g" value="0" oninput="calc()">

        <label>Rusa</label>
        <input type="number" id="r" value="0" oninput="calc()">

        <label>Rusa preparada</label>
        <input type="number" id="rp" value="0" oninput="calc()">

        <div id="productosExtra"></div>

        <label>Monto recibido</label>
        <input type="number" id="monto" oninput="calc()">

        <label>Método</label>
        <select id="metodo">
            <option>Efectivo</option>
            <option>Transferencia</option>
        </select>

        <div class="total">Total: $ <span id="total">0</span></div>
        <div class="total">Cambio: $ <span id="cambio">0</span></div>

        <button class="cerrar-btn" onclick="guardar()">
            Registrar venta
        </button>

        <button class="cerrar-btn" onclick="cerrarVentas()">
            Cerrar ventas del día
        </button>


    </div>


    <!-- MODALES -->


    <div id="splash" class="splash"></div>

    <script type="module">

        window.editandoBase = null;
        window.editandoProducto = undefined;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // 🔥 CONFIG FIREBASE (PON LOS TUYOS)
        const firebaseConfig = {
            apiKey: "AIzaSyAitZJnQ-zw8UbsWQ3VJA7Y94bNxivNZuE",
            authDomain: "gomiboings-chinitos-ec507.firebaseapp.com",
            databaseURL: "https://gomiboings-chinitos-ec507-default-rtdb.firebaseio.com",
            projectId: "gomiboings-chinitos-ec507",
            storageBucket: "gomiboings-chinitos-ec507.firebasestorage.app",
            messagingSenderId: "71771683056",
            appId: "1:71771683056:web:dffdd2ac0fb07365c62a35"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // =============================
        // 🔧 TUS VARIABLES
        // =============================

        let preciosBase = {
            gomiboing: 30,
            rusa: 35,
            preparada: 40
        };

        let productos = JSON.parse(localStorage.getItem("productos")) || [];
        let ventas = [];
        let hoy = new Date().toLocaleString().split(",")[0];

        document.getElementById("fecha").value = hoy;

        renderProductos();

        // =============================
        // 🔄 SINCRONIZACIÓN TIEMPO REAL
        // =============================

        onValue(ref(db, "ventas"), (snapshot) => {
            ventas = [];

            snapshot.forEach(child => {
                ventas.push(child.val());
            });

            actualizarVenta();
            actualizarGanancias(); 

        });

        // =============================
        // 🧮 CALCULAR
        // =============================

        window.calc = function () {

            let g = +document.getElementById("g").value || 0;
            let r = +document.getElementById("r").value || 0;
            let rp = +document.getElementById("rp").value || 0;
            let m = +document.getElementById("monto").value || 0;

            let total =
                (g * preciosBase.gomiboing) +
                (r * preciosBase.rusa) +
                (rp * preciosBase.preparada);

            productos.forEach((p, i) => {
                let val = +document.getElementById("extra" + i)?.value || 0;
                total += val * p.precio;
            });

            let cambio = m - total;

            document.getElementById("total").innerText = total;
            document.getElementById("cambio").innerText = cambio > 0 ? cambio : 0;
        };

        function renderProductos() {

            let cont = document.getElementById("productosExtra");
            cont.innerHTML = "";

            productos.forEach((p, i) => {
                cont.innerHTML += `
            <label>${p.nombre}</label>
            <input type="number" id="extra${i}" value="0" oninput="calc()">
        `;
            });

        }

        // =============================
        // 💾 GUARDAR VENTA (ANTI FALLOS)
        // =============================

        window.guardar = function () {

            let total = +document.getElementById("total").innerText;
            let monto = +document.getElementById("monto").value || 0;

            if (total === 0) {
                splash("❌ Agrega productos");
                return;
            }

            if (monto < total) {
                splash("❌ Dinero insuficiente");
                return;
            }

            let extras = [];

            productos.forEach((p, i) => {
                let val = +document.getElementById("extra" + i)?.value || 0;
                if (val > 0) {
                    extras.push({ nombre: p.nombre, cantidad: val });
                }
            });

            let numeroVenta = ventas.length + 1;

            let venta = {
                n: numeroVenta,
                fecha: new Date().toLocaleString(),
                g: +document.getElementById("g").value || 0,
                r: +document.getElementById("r").value || 0,
                rp: +document.getElementById("rp").value || 0,
                extras: extras, // 🔥 ESTA LÍNEA FALTABA
                total: total,
                monto: monto,
                metodo: document.getElementById("metodo").value,
                cambio: monto - total
            };

            // 🔥 GUARDAR EN FIREBASE
            push(ref(db, "ventas"), venta)
                .then(() => {

                    splash("✅ Venta guardada");

                    setTimeout(() => {
                        limpiarFormulario();
                        actualizarVenta();
                    }, 100);

                })

        };

        function limpiarFormulario() {

            document.getElementById("g").value = 0;
            document.getElementById("r").value = 0;
            document.getElementById("rp").value = 0;
            document.getElementById("monto").value = "";

            productos.forEach((p, i) => {
                let input = document.getElementById("extra" + i);
                if (input) input.value = 0;
            });

            calc(); // 🔥 recalcula todo
        }

        function enviarAExcel(venta) {

            fetch("https://script.google.com/macros/s/AKfycbzJHSp_tUwyLUw5qpUvqUxf6tLz13jbeagATBNbXGui0OWKJN1p61yhrl4KGxC6hiAJ/exec", {
                method: "POST",
                body: JSON.stringify(venta)
            })
                .then(() => console.log("Excel OK"))
                .catch(() => console.log("Error Excel"));

        }


        async function enviarTodasAExcel() {

            for (let i = 0; i < ventas.length; i++) {

                let venta = ventas[i];

                await fetch("https://script.google.com/macros/s/AKfycbzJHSp_tUwyLUw5qpUvqUxf6tLz13jbeagATBNbXGui0OWKJN1p61yhrl4KGxC6hiAJ/exec", {
                    method: "POST",
                    body: JSON.stringify(venta)
                });

                await new Promise(r => setTimeout(r, 300));

            }

        }

        // =============================
        // 🔁 SISTEMA ANTI PÉRDIDA
        // =============================

        function guardarPendiente(v) {
            let p = JSON.parse(localStorage.getItem("pendientes")) || [];
            p.push(v);
            localStorage.setItem("pendientes", JSON.stringify(p));
        }

        function reintentarPendientes() {
            let p = JSON.parse(localStorage.getItem("pendientes")) || [];

            if (p.length === 0) return;

            p.forEach(v => {
                push(ref(db, "ventas"), v);
            });

            localStorage.removeItem("pendientes");
        }

        // cada 10 segundos
        setInterval(reintentarPendientes, 10000);

        // =============================
        // 📊 HISTORIAL
        // =============================

        window.abrirHistorial = function () {

            let lista = document.getElementById("historial")
            lista.innerHTML = ""

            if (ventas.length === 0) {
                lista.innerHTML = "No hay ventas"
                return
            }

            ventas.forEach(v => {

                let extrasHTML = ""

                if (v.extras && v.extras.length > 0) {
                    v.extras.forEach(e => {
                        extrasHTML += `<div>${e.nombre} x${e.cantidad}</div>`
                    })
                }

                lista.innerHTML += `
<div style="
background:#fff;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
">

        <div style="text-align:center;font-weight:bold;">
            🧾 Venta #${v.n || ""}
        </div>

        <div style="margin-top:8px;">
            Gomiboing: ${v.g}
        </div>
        <div>Rusa: ${v.r}</div>
        <div>Preparada: ${v.rp}</div>

        ${extrasHTML}

        <hr>

        <div><b>Total: $${v.total}</b></div>
        <div>Recibido: $${v.monto}</div>
        <div>Cambio: $${v.cambio}</div>

        <div style="font-size:12px;color:#666;margin-top:5px;">
            ${v.metodo} • ${v.fecha}
        </div>

</div>
`
            })

            document.getElementById("modalHistorial").classList.add("active")
        }

        // =============================
        // 🔔 UI
        // =============================

        window.splash = function (msg) {
            let s = document.getElementById("splash");
            s.innerText = msg;
            s.classList.add("show");

            setTimeout(() => {
                s.classList.remove("show");
            }, 1000);
        };

        function actualizarVenta() {
            document.getElementById("venta").value = ventas.length + 1;
        }

        function actualizarGanancias() {

            let total = 0;
            let efectivo = 0;
            let transferencia = 0;

            ventas.forEach(v => {

                let fechaVenta = v.fecha.split(",")[0];

                if (fechaVenta === hoy) {

                    total += v.total;

                    if (v.metodo === "Efectivo") {
                        efectivo += v.total;
                    } else {
                        transferencia += v.total;
                    }

                }

            });

            let div = document.getElementById("ganancia");

            if (div) {
                div.innerHTML = `
            <div style="text-align:center;">
                <h2>$${total}</h2>
                <p>Efectivo: $${efectivo}</p>
                <p>Transferencia: $${transferencia}</p>
            </div>
        `;
            }

        }

        window.abrirGanancia = function () {

            let total = 0
            let efectivo = 0
            let transferencia = 0

            ventas.forEach(v => {

                let fechaVenta = new Date(v.fecha).toLocaleDateString()

                if (fechaVenta === hoy) {

                    total += v.total

                    if (v.metodo === "Efectivo") {
                        efectivo += v.total
                    } else {
                        transferencia += v.total
                    }

                }

            })

            document.getElementById("ganancia").innerHTML = `
        <div style="text-align:center;">
            <h2>$${total}</h2>
            <p>Efectivo: $${efectivo}</p>
            <p>Transferencia: $${transferencia}</p>
        </div>
        `

            document.getElementById("modalGanancia").classList.add("active")
        }

        window.borrarHistorial = function () {
            document.getElementById("modalConfirmar").classList.add("active")
        }

        window.confirmarBorrado = function () {

            fetch("https://gomiboings-chinitos-ec507-default-rtdb.firebaseio.com/ventas.json", {
                method: "DELETE"
            })
                .then(() => {

                    ventas = [];              // 🔥 limpia memoria
                    actualizarVenta();        // 🔥 reinicia número
                    limpiarFormulario();      // 🔥 limpia campos

                    cerrar();                 // 🔥 CIERRA MODAL

                    splash("🗑 Historial eliminado"); // 🔥 mensaje correcto
                })
        }

        window.cerrar = function () {
            document.querySelectorAll(".modal").forEach(m => {
                m.classList.remove("active");
            });
        }

        window.toggleEdicion = function () {

            let cont = document.getElementById("listaEditarProductos");
            cont.innerHTML = "";

            // 🔥 BASE
            cont.innerHTML += `
        <div class="producto-item">
            <div class="producto-nombre">Gomiboing ($${preciosBase.gomiboing})</div>
            <button class="btn-mini btn-editar" onclick="editarBase('gomiboing')">Editar</button>
        </div>

        <div class="producto-item">
            <div class="producto-nombre">Rusa ($${preciosBase.rusa})</div>
            <button class="btn-mini btn-editar" onclick="editarBase('rusa')">Editar</button>
        </div>

        <div class="producto-item">
            <div class="producto-nombre">Preparada ($${preciosBase.preparada})</div>
            <button class="btn-mini btn-editar" onclick="editarBase('preparada')">Editar</button>
        </div>
    `;

            // 🔥 PRODUCTOS EXTRA
            productos.forEach((p, i) => {
                cont.innerHTML += `
            <div class="producto-item">
                <div class="producto-nombre">${p.nombre} ($${p.precio})</div>
                <div class="producto-acciones">
                    <button class="btn-mini btn-editar" onclick="editarProducto(${i})">Editar</button>
                    <button class="btn-mini btn-eliminar" onclick="eliminarProducto(${i})">Eliminar</button>
                </div>
            </div>
        `;
            });

            document.getElementById("modalEditarProductos").classList.add("active");
        }

        window.editarProducto = function (i) {

            let p = productos[i];

            document.getElementById("nombreProducto").value = p.nombre;
            document.getElementById("precioProducto").value = p.precio;

            window.editandoProducto = i;
            window.editandoBase = null; // 🔥 IMPORTANTE

            cerrar();
            document.getElementById("modalProducto").classList.add("active");
        }


        window.editarBase = function (tipo) {

            let nombre = "";
            let valor = 0;

            if (tipo === "gomiboing") {
                nombre = "Gomiboing";
                valor = preciosBase.gomiboing;
            }

            if (tipo === "rusa") {
                nombre = "Rusa";
                valor = preciosBase.rusa;
            }

            if (tipo === "preparada") {
                nombre = "Rusa preparada";
                valor = preciosBase.preparada;
            }

            document.getElementById("nombreProducto").value = nombre;
            document.getElementById("precioProducto").value = valor;

            window.editandoBase = tipo;
            window.editandoProducto = undefined;

            cerrar(); // 🔥 ESTA LÍNEA ES LA CLAVE

            document.getElementById("modalProducto").classList.add("active");
        }

        window.guardarProducto = function () {

            let nombre = document.getElementById("nombreProducto").value.trim();
            let precio = +document.getElementById("precioProducto").value;

            if (!nombre || precio <= 0) {
                splash("❌ Datos inválidos");
                return;
            }

            // 🔥 EDITAR BASE
            if (window.editandoBase !== null && window.editandoBase !== undefined) {

                preciosBase[window.editandoBase] = precio;

                calc();
                toggleEdicion();

                setTimeout(() => cerrar(), 100); // 🔥 CLAVE

                splash("💲 Precio actualizado");
                return;
            }

            // 🔥 EDITAR PRODUCTO
            if (window.editandoProducto !== undefined) {

                productos[window.editandoProducto] = { nombre, precio };

                window.editandoProducto = undefined; // 🔥 LIMPIAR
                window.editandoBase = null;

                localStorage.setItem("productos", JSON.stringify(productos));

                renderProductos();
                toggleEdicion(); // 🔥 refresca lista

                cerrar();
                splash("✏️ Producto actualizado");
                return;
            }

            // 🔥 NUEVO PRODUCTO
            productos.push({ nombre, precio });

            localStorage.setItem("productos", JSON.stringify(productos));

            renderProductos();

            cerrar();
            splash("✅ Producto agregado");

            document.getElementById("nombreProducto").value = "";
            document.getElementById("precioProducto").value = "";

            console.log("EDITANDO BASE:", window.editandoBase);
        };

        window.eliminarProducto = function (i) {

            productos.splice(i, 1);

            localStorage.setItem("productos", JSON.stringify(productos));

            renderProductos();

            toggleEdicion(); // 🔥 ESTA LÍNEA FALTABA

            splash("🗑 Producto eliminado");
        }

        // 🔥 HACER FUNCIONES GLOBALES
        window.renderProductos = renderProductos;
        window.actualizarVenta = actualizarVenta;
        window.reintentarPendientes = reintentarPendientes;

        window.abrirProducto = function () {

            document.getElementById("nombreProducto").value = "";
            document.getElementById("precioProducto").value = "";

            window.editandoProducto = undefined;
            window.editandoBase = null;

            document.getElementById("modalProducto").classList.add("active");
        }

        // 🔥 AQUÍ VA
        window.continuar = function () {
            cerrar();
        }


        window.cerrarVentas = async function () {

            if (ventas.length === 0) {
                splash("❌ No hay ventas");
                return;
            }

            let modal = document.getElementById("modalProceso");
            let texto = document.getElementById("estadoTexto");
            let boton = document.getElementById("btnContinuar");
            let loader = document.getElementById("loader");

            modal.classList.add("active");

            texto.innerText = "📡 Enviando ventas a Excel...";
            loader.style.display = "block";
            boton.style.display = "none";

            try {

                await enviarTodasAExcel();

                await fetch("https://gomiboings-chinitos-ec507-default-rtdb.firebaseio.com/ventas.json", {
                    method: "DELETE"
                });

                ventas = [];
                actualizarVenta();
                limpiarFormulario();

                texto.innerText = "✅ Día cerrado correctamente";
                loader.style.display = "none";
                boton.style.display = "flex";

            } catch (e) {

                texto.innerText = "❌ Error al enviar ventas";
                loader.style.display = "none";
                boton.style.display = "flex";

            }

        };

    </script>


    <!-- HISTORIAL -->
    <div class="modal" id="modalHistorial">
        <div class="modal-box">

            <div class="modal-header">
                <h3>Historial</h3>
                <button class="close-btn" onclick="cerrar()">✖</button>
            </div>

            <div id="historial" class="lista"></div>

            <button class="cerrar-btn" onclick="borrarHistorial()" style="background:linear-gradient(135deg,#ff2b2b,#a80000);">
                Borrar historial
            </button>

        </div>
    </div>

    <!-- GANANCIAS -->
    <div class="modal" id="modalGanancia">
        <div class="modal-box">

            <div class="modal-header">
                <h3>Ganancias del día</h3>
                <button class="close-btn" onclick="cerrar()">✖</button>
            </div>

            <div id="ganancia" class="lista"></div>

            <button class="cerrar-btn" onclick="borrarHistorial()" style="background:linear-gradient(135deg,#ff2b2b,#a80000);">
                Borrar datos
            </button>


        </div>
    </div>


    <!-- MODAL PROCESO -->
    <div id="modalProceso" class="modal">
        <div class="modal-box" style="text-align:center;">

            <h3 id="estadoTexto">Procesando...</h3>

            <div id="loader" class="loader"></div>

            <button id="btnContinuar"
                    class="cerrar-btn"
                    style="display:none;margin-top:20px;"
                    onclick="continuar()">
                Continuar
            </button>

        </div>
    </div>

    <div class="modal" id="modalProducto">
        <div class="modal-box">

            <div class="modal-header">
                <h3 id="tituloProducto">Nuevo producto</h3>
                <button class="close-btn" onclick="cerrar()">✖</button>
            </div>

            <label>Nombre</label>
            <input id="nombreProducto">

            <label>Precio</label>
            <input type="number" id="precioProducto">

            <button class="cerrar-btn" onclick="guardarProducto()">
                Guardar producto
            </button>

        </div>
    </div>

    <div class="modal" id="modalEditarProductos">
        <div class="modal-box">

            <div class="modal-header">
                <h3>Editar productos</h3>
                <button class="close-btn" onclick="cerrar()">✖</button>
            </div>

            <div id="listaEditarProductos"></div>

        </div>
    </div>

    <div class="modal" id="modalConfirmar">
        <div class="modal-box" style="text-align:center;">
            <h3>¿Borrar historial?</h3>
            <p style="font-size:13px;color:#666;">Esta acción no se puede deshacer</p>

            <button class="cerrar-btn" onclick="confirmarBorrado()">
                Sí, borrar
            </button>

            <button class="cerrar-btn" onclick="cerrar()" style="background:#aaa;">
                Cancelar
            </button>
        </div>
    </div>

</body>
</html>
