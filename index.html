<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomiboings CHINITOS</title>

    <style>

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI',sans-serif;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            padding: 15px;
            background: linear-gradient(135deg,#ff2b2b,#7a0000);
            background-attachment: fixed;
        }

            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background: radial-gradient(circle at top, rgba(255,255,255,0.15), transparent);
                pointer-events: none;
            }

        html {
            background: linear-gradient(135deg,#d60000,#a80000);
        }


        /* BOINGS */

        .boing-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .boing {
            position: absolute;
            width: clamp(55px, 12vw, 85px);
            opacity: 0.8;
            animation: move 22s linear infinite;
            will-change: transform;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
        }

        @keyframes move {
            0% {
                transform: translate3d(0,0,0);
            }

            100% {
                transform: translate3d(120vw,0,0);
            }
        }

        /* TARJETA */

        .app {
            background: rgba(255,255,255,0.9);
            width: 100%;
            max-width: 380px;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
            margin: auto;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 📱 CELULARES */
        @media (max-width: 480px) {
            .app {
                max-width: 100%;
                padding: 18px;
                border-radius: 18px;
            }
        }

        /* 📲 TABLETS */
        @media (min-width: 481px) and (max-width: 900px) {
            .app {
                max-width: 420px;
            }
        }

        /* 💻 COMPUTADORAS */
        @media (min-width: 901px) {
            .app {
                max-width: 420px;
            }
        }

        /* BOTONES */

        .top-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .circle-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg,#ff2b2b,#a80000);
            color: white;
            border: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            font-size: 18px;
            cursor: pointer;
            transition: 0.25s;
        }

            .circle-btn:hover {
                transform: scale(1.1);
            }

            .circle-btn:active {
                transform: scale(0.9);
            }

        /* LOGO */

        .logo {
            display: block;
            margin: auto;
            width: 110px;
        }

        /* CAMPOS */

        label {
            margin-top: 10px;
            display: block;
            font-size: 13px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ccc;
            margin-top: 5px;
            font-size: 16px;
        }

        /* TEXTO */

        .total {
            margin-top: 10px;
            font-weight: bold;
            color: #c40000;
        }

        /* BOTON */

        .main {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #d60000;
            color: white;
            cursor: pointer;
        }

        /* MODALES */

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 350px;
        }

        .close {
            float: right;
            cursor: pointer;
        }

        /* SPLASH */

        .splash {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%) scale(0.5);
            background: #ff0000;
            color: white;
            padding: 20px;
            border-radius: 20px;
            opacity: 0;
            z-index: 999;
        }

            .splash.show {
                animation: splash 0.6s forwards;
            }

        @keyframes splash {
            0% {
                transform: translate(-50%,-50%) scale(0.5);
                opacity: 0;
            }

            50% {
                transform: translate(-50%,-50%) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translate(-50%,-50%) scale(1);
                opacity: 1;
            }
        }

        /* MODAL PRO */

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

            .modal.active {
                display: flex;
            }

        .modal-box {
            background: #fff;
            width: 90%;
            max-width: 350px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: aparecer 0.3s ease;
        }

        @keyframes aparecer {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* HEADER */

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .close-btn {
            background: #eee;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* BOTON BORRAR */

        .delete-btn {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #ff3b3b;
            color: white;
            cursor: pointer;
        }

        /* LISTA */

        .lista {
            font-size: 14px;
            max-height: 200px;
            overflow-y: auto;
        }

        .cerrar-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg,#111,#333);
            color: white;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: 0.25s;
        }

            /* HOVER */

            .cerrar-btn:hover {
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            }

            /* CLICK */

            .cerrar-btn:active {
                transform: scale(0.95);
            }

        .cerrar-btn {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg,#111,#333);
            color: white;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            transition: 0.25s;
        }

            /* HOVER */

            .cerrar-btn:hover {
                transform: translateY(-2px) scale(1.02);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            }

            /* CLICK */

            .cerrar-btn:active {
                transform: scale(0.95);
            }

        .loader {
            width: 40px;
            height: 40px;
            border: 5px solid #eee;
            border-top: 5px solid #ff0000;
            border-radius: 50%;
            animation: girar 1s linear infinite;
            margin: auto;
        }

        @keyframes girar {
            to {
                transform: rotate(360deg);
            }
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        * {
            -webkit-font-smoothing: antialiased;
            -webkit-transform: translateZ(0);
        }

        /* SUAVIDAD EN CELULAR */
        * {
            -webkit-font-smoothing: antialiased;
            -webkit-transform: translateZ(0);
        }

        /* BOTONES MÁS GRANDES EN CELULAR */
        @media (max-width: 480px) {
            .cerrar-btn {
                padding: 16px;
                font-size: 16px;
            }

            .circle-btn {
                width: 44px;
                height: 44px;
            }
        }

        /* MODALES RESPONSIVOS */
        .modal-box {
            width: 90%;
            max-width: 360px;
        }

        @media (max-width: 480px) {
            .modal-box {
                width: 95%;
                padding: 18px;
            }
        }

        /* IMÁGENES */
        img {
            max-width: 100%;
            height: auto;
        }

        @media (max-width: 480px) {

            body {
                align-items: flex-start;
                padding-top: 20px;
            }

            .boing {
                opacity: 0.6;
                animation-duration: 28s;
            }
        }

        body {
            overflow-y: auto;
        }

        .producto-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .producto-nombre {
            font-weight: bold;
            margin-bottom: 5px;
        }

        .producto-acciones {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-mini {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn-editar {
            background: #007bff;
        }

        .btn-eliminar {
            background: #ff3b3b;
        }

        @media (max-width: 480px) {
            .boing {
                animation-duration: 35s;
                opacity: 0.5;
            }
        }

    </style>
</head>

<body>

    <div class="boing-bg">
        <img src="boing1.png" class="boing" style="top:5%; left:-100px;">
        <img src="boing2.png" class="boing" style="top:15%; left:-300px;">
        <img src="boing1.png" class="boing" style="top:30%; left:-500px;">
        <img src="boing2.png" class="boing" style="top:45%; left:-700px;">
        <img src="boing1.png" class="boing" style="top:60%; left:-200px;">
        <img src="boing2.png" class="boing" style="top:75%; left:-400px;">
        <img src="boing1.png" class="boing" style="top:85%; left:-600px;">
    </div>

    <div class="app">


        <div class="top-buttons">
            <button class="circle-btn" onclick="abrirHistorial()">📊</button>
            <button class="circle-btn" onclick="abrirGanancia()">💵</button>
            <button class="circle-btn" onclick="abrirProducto()">➕</button>
            <button class="circle-btn" onclick="toggleEdicion()">✏️</button>

        </div>

        <img src="Logo.png" class="logo">

        <h3 style="text-align:center;color:#c40000;">Gomiboings CHINITOS</h3>

        <label>No. Venta</label>
        <input id="venta" disabled>

        <label>Fecha</label>
        <input id="fecha" disabled>

        <label>Gomiboing</label>
        <input type="number" id="g" value="0" oninput="calc()">

        <label>Rusa</label>
        <input type="number" id="r" value="0" oninput="calc()">

        <label>Rusa preparada</label>
        <input type="number" id="rp" value="0" oninput="calc()">

        <div id="productosExtra"></div>

        <label>Monto recibido</label>
        <input type="number" id="monto" oninput="calc()">

        <label>Método</label>
        <select id="metodo">
            <option>Efectivo</option>
            <option>Transferencia</option>
        </select>

        <div class="total">Total: $ <span id="total">0</span></div>
        <div class="total">Cambio: $ <span id="cambio">0</span></div>

        <button class="cerrar-btn" onclick="guardar()">
            Registrar venta
        </button>

        <button class="cerrar-btn" onclick="cerrarVentas()">
            Cerrar ventas del día
        </button>


    </div>


    <!-- MODALES -->


    <div id="splash" class="splash"></div>

    <script>

        let preciosBase = {
            gomiboing: 30,
            rusa: 35,
            preparada: 40
        }

        let productos = JSON.parse(localStorage.getItem("productos")) || []
        let editandoIndex = null

        let ventas = JSON.parse(localStorage.getItem("ventas")) || []
        let hoy = new Date().toLocaleDateString()

        fecha.value = hoy

        function actualizarVenta() {
            let ventas = JSON.parse(localStorage.getItem("ventas")) || []
            document.getElementById("venta").value = ventas.length + 1
        }

        actualizarVenta()

        function calc() {

            let gVal = Number(document.getElementById("g").value) || 0
            let rVal = Number(document.getElementById("r").value) || 0
            let rpVal = Number(document.getElementById("rp").value) || 0
            let mVal = Number(document.getElementById("monto").value) || 0

            let total =
                (gVal * preciosBase.gomiboing) +
                (rVal * preciosBase.rusa) +
                (rpVal * preciosBase.preparada)

            // productos dinámicos
            productos.forEach((p, i) => {
                let val = Number(document.getElementById("extra" + i)?.value) || 0
                total += val * p.precio
            })

            let cambio = mVal - total

            document.getElementById("total").innerText = total
            document.getElementById("cambio").innerText = cambio > 0 ? cambio : 0
        }

        function guardar() {

            let ventas = JSON.parse(localStorage.getItem("ventas")) || []

            let total = +document.getElementById("total").innerText
            let monto = +document.getElementById("monto").value || 0

            if (total === 0) {
                splash("❌ Agrega productos")
                return
            }

            if (monto < total) {
                splash("❌ Dinero insuficiente")
                return
            }

            let extrasVenta = []

            productos.forEach((p, i) => {
                let val = Number(document.getElementById("extra" + i)?.value) || 0
                if (val > 0) {
                    extrasVenta.push({
                        nombre: p.nombre,
                        cantidad: val
                    })
                }
            })

            let venta = {
                n: ventas.length + 1,
                fecha: hoy,
                g: +document.getElementById("g").value || 0,
                r: +document.getElementById("r").value || 0,
                rp: +document.getElementById("rp").value || 0,

                extras: extrasVenta,

                total: total,
                monto: monto,
                metodo: document.getElementById("metodo").value,
                cambio: monto - total,
                ganancia: total
            }

            ventas.push(venta)
            localStorage.setItem("ventas", JSON.stringify(ventas))

            splash("✔ Venta registrada")

            setTimeout(() => {
                location.reload()
            }, 800)

            fetch("https://script.google.com/macros/s/AKfycbxccy3NzcO1d-G5OL9qFBinRDmfO3n85bpfFW5DelhxfRpEdZUrfwt8lqlp_xvlUAe9/exec", {
                method: "POST",
                body: JSON.stringify(venta)
            })

            abrirHistorial()
        }

        function splash(msg) {
            let s = document.getElementById("splash")
            s.innerText = msg
            s.classList.add("show")
            s.style.opacity = 1

            setTimeout(() => {
                s.classList.remove("show")
                s.style.opacity = 0
            }, 1000)
        }

        /* MODALES */






        function abrirHistorial() {

            let ventas = JSON.parse(localStorage.getItem("ventas")) || []
            let lista = document.getElementById("historial")

            lista.innerHTML = ""

            if (ventas.length === 0) {
                lista.innerHTML = "No hay ventas"
                return
            }

            ventas.forEach(v => {

                let extrasHTML = ""

                if (v.extras && v.extras.length > 0) {
                    v.extras.forEach(e => {
                        extrasHTML += `<div>${e.nombre} x${e.cantidad}</div>`
                    })
                }

                lista.innerHTML += `
<div style="
background:#fff;
border-radius:15px;
padding:15px;
margin-bottom:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
">

        <div style="text-align:center;font-weight:bold;">
            🧾 Venta #${v.n}
        </div>

        <div style="margin-top:8px;">
            Gomiboing: ${v.g}
        </div>
        <div>Rusa: ${v.r}</div>
        <div>Preparada: ${v.rp}</div>

        ${extrasHTML}

        <hr>

        <div><b>Total: $${v.total}</b></div>
        <div>Recibido: $${v.monto}</div>
        <div>Cambio: $${v.cambio}</div>

        <div style="font-size:12px;color:#666;margin-top:5px;">
            ${v.metodo} • ${v.fecha}
        </div>

</div>
`
            })

            document.getElementById("modalHistorial").classList.add("active")
        }

        function abrirGanancia() {

            let ventas = JSON.parse(localStorage.getItem("ventas")) || []

            let total = 0
            let efectivo = 0
            let transferencia = 0

            ventas.forEach(v => {

                if (v.fecha === hoy) {

                    total += v.total

                    if (v.metodo === "Efectivo") {
                        efectivo += v.total
                    } else {
                        transferencia += v.total
                    }

                }

            })

            document.getElementById("ganancia").innerHTML = `
<div style="text-align:center;">
<h2>$${total}</h2>
<p>Efectivo: $${efectivo}</p>
<p>Transferencia: $${transferencia}</p>
</div>
`

            document.getElementById("modalGanancia").classList.add("active")
        }

        function cerrar() {
            document.querySelectorAll(".modal").forEach(m => {
                m.classList.remove("active")
            })
        }

        function borrarHistorial() {
            localStorage.removeItem("ventas")
            location.reload()
        }

        function cerrarVentas() {

            let ventas = JSON.parse(localStorage.getItem("ventas")) || []

            if (ventas.length === 0) {
                splash("❌ No hay ventas")
                return
            }

            let modal = document.getElementById("modalProceso")
            let texto = document.getElementById("estadoTexto")
            let boton = document.getElementById("btnContinuar")
            let loader = document.getElementById("loader")

            modal.classList.add("active")

            // 🔥 ESTADO 1 (cargando)
            texto.innerText = "📡 Guardando ventas en la nube..."
            loader.style.display = "block"
            boton.style.display = "none"

            // ⏳ SIMULACIÓN DE PROCESO
            setTimeout(() => {

                // 🔥 ESTADO 2 (terminado)
                texto.innerText = "✅ Ventas registradas correctamente"
                loader.style.display = "none"
                boton.style.display = "flex"

            }, 1500)

        }

        function continuar() {

            localStorage.removeItem("ventas")

            document.getElementById("modalProceso").classList.remove("active")

            location.reload()

        }

        function abrirProducto() {

            document.getElementById("nombreProducto").value = ""
            document.getElementById("precioProducto").value = ""
            document.getElementById("tituloProducto").innerText = "Nuevo producto"

            editandoIndex = null

            document.getElementById("modalProducto").classList.add("active")
        }

        function guardarProducto() {

            let nombre = document.getElementById("nombreProducto").value
            let precio = Number(document.getElementById("precioProducto").value)

            if (!nombre || !precio) {
                splash("❌ Completa los datos")
                return
            }

            // 🔥 EDITAR PRECIOS BASE
            if (window.editandoBase) {
                preciosBase[window.editandoBase] = precio
                window.editandoBase = null
                cerrar()
                calc()
                splash("💲 Precio actualizado")
                return
            }

            let producto = { nombre, precio }

            let esEdicion = editandoIndex !== null

            if (esEdicion) {
                productos[editandoIndex] = producto
            } else {
                productos.push(producto)
            }

            editandoIndex = null

            localStorage.setItem("productos", JSON.stringify(productos))

            cerrar()
            renderProductos()
            calc()

            splash(esEdicion ? "✏️ Producto actualizado" : "✅ Producto agregado")
        }

        function editarProducto(i) {

            let p = productos[i]

            document.getElementById("nombreProducto").value = p.nombre
            document.getElementById("precioProducto").value = p.precio
           

            document.getElementById("tituloProducto").innerText = "Editar producto"

            editandoIndex = i

            document.getElementById("modalProducto").classList.add("active")
        }

        function renderProductos() {

            let cont = document.getElementById("productosExtra")
            cont.innerHTML = ""

            productos.forEach((p, i) => {

                cont.innerHTML += `
<div style="margin-top:10px;">
        <label>${p.nombre}</label>
        <input type="number" value="0" id="extra${i}" oninput="calc()">
</div>
`
            })
        }

        renderProductos()

        function toggleEdicion() {

            let cont = document.getElementById("listaEditarProductos")
            cont.innerHTML = ""

            // 🔴 PRODUCTOS BASE
            cont.innerHTML += `
    <div class="producto-item">
        <div class="producto-nombre">Gomiboing ($${preciosBase.gomiboing})</div>
        <div class="producto-acciones">
            <button class="btn-mini btn-editar" onclick="editarBase('gomiboing')">💲 Precio</button>
        </div>
    </div>

    <div class="producto-item">
        <div class="producto-nombre">Rusa ($${preciosBase.rusa})</div>
        <div class="producto-acciones">
            <button class="btn-mini btn-editar" onclick="editarBase('rusa')">💲 Precio</button>
        </div>
    </div>

    <div class="producto-item">
        <div class="producto-nombre">Rusa preparada ($${preciosBase.preparada})</div>
        <div class="producto-acciones">
            <button class="btn-mini btn-editar" onclick="editarBase('preparada')">💲 Precio</button>
        </div>
    </div>
    `

            // 🔵 PRODUCTOS EXTRA
            productos.forEach((p, i) => {

                cont.innerHTML += `
        <div class="producto-item">

            <div class="producto-nombre">
                ${p.nombre} ($${p.precio})
            </div>

            <div class="producto-acciones">

                <button class="btn-mini btn-editar"
                    onclick="cambiarPrecio(${i})">
                    💲 Precio
                </button>

                <button class="btn-mini btn-eliminar"
                    onclick="eliminarProducto(${i})">
                    🗑 Eliminar
                </button>

            </div>

        </div>
        `
            })

            document.getElementById("modalEditarProductos").classList.add("active")
        }

        function cambiarPrecio(i) {

            document.getElementById("nombreProducto").value = productos[i].nombre
            document.getElementById("precioProducto").value = productos[i].precio

            editandoIndex = i

            document.getElementById("tituloProducto").innerText = "Editar producto"
            document.getElementById("modalProducto").classList.add("active")
        }

        function eliminarProducto(i) {

            if (!confirm("¿Eliminar producto?")) return

            productos.splice(i, 1)

            localStorage.setItem("productos", JSON.stringify(productos))
            renderProductos()
            calc()

            splash("🗑 Producto eliminado")

            toggleEdicion() // refresca lista
        }

        function editarBase(tipo) {

            let nombre = ""
            let valor = 0

            if (tipo === "gomiboing") {
                nombre = "Gomiboing"
                valor = preciosBase.gomiboing
            }

            if (tipo === "rusa") {
                nombre = "Rusa"
                valor = preciosBase.rusa
            }

            if (tipo === "preparada") {
                nombre = "Rusa preparada"
                valor = preciosBase.preparada
            }

            document.getElementById("nombreProducto").value = nombre
            document.getElementById("precioProducto").value = valor

            window.editandoBase = tipo
            editandoIndex = null

            document.getElementById("tituloProducto").innerText = "Editar precio base"
            document.getElementById("modalProducto").classList.add("active")
        }

    </script>
